    uri = "https://repo1.maven.org/maven2/org/cloudfoundry/tomcat-access-logging-support/3.4.0.RELEASE/tomcat-access-logging-support-3.4.0.RELEASE.jar"
    version = "3.4.0"

    [[metadata.dependencies.licenses]]
      type = "Apache-2.0"

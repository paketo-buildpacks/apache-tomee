    source-sha256 = "53a555c34710407e554cec361ecde785bb7c3584eb1ae1130c840c7f3eb92489"
    stacks = ["*"]
    uri = "https://downloads.apache.org/tomee/tomee-10.2.0/apache-tomee-10.2.0-plume.tar.gz"
    version = "10.2.0"

    [[metadata.dependencies.licenses]]
      type = "Apache-2.0"
      uri = "https://www.apache.org/licenses/"

  [[metadata.dependencies]]
    cpes = ["cpe:2.3:a:cloudfoundry:tomcat-access-logging-support:3.4.0:*:*:*:*:*:*:*"]
    id = "tomcat-access-logging-support"
